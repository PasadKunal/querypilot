name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: ruff check .

      - name: Run tests
        env:
          DATABASE_URL: "postgresql://user:password@localhost/test"
          SANDBOX_DATABASE_URL: "postgresql://user:password@localhost/test"
          JWT_SECRET_KEY: "test-secret-key"
          OPENAI_API_KEY: "sk-test"
          ANTHROPIC_API_KEY: "test"
          GROQ_API_KEY: "test"
        run: pytest tests/ -v
